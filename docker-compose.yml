services:
  ticket-agent:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file:
      - .env
    environment:
      GLPI_AGENT_TYPE: admin
      GLPI_AGENT_HOST: 0.0.0.0
      GLPI_AGENT_PORT: 8003
      GLPI_AGENT_DEV_SUBPROCESS: "true"
    volumes:
      - ./glpi_agent:/app/glpi_agent
    ports:
      - "8003:8003"

  knowledge-agent:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file:
      - .env
    environment:
      GLPI_AGENT_TYPE: knowledge-base
      GLPI_AGENT_HOST: 0.0.0.0
      GLPI_AGENT_PORT: 8004
      GLPI_AGENT_DEV_SUBPROCESS: "true"
    volumes:
      - ./glpi_agent:/app/glpi_agent
    ports:
      - "8004:8004"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      BACKEND_URL: http://ticket-agent:8003
      BACKEND_KB_URL: http://knowledge-agent:8004
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    command: npm run dev -- --hostname 0.0.0.0 --port 3003
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    ports:
      - "3003:3003"
    depends_on:
      - ticket-agent
      - knowledge-agent

volumes:
  frontend_node_modules:
  frontend_next:
