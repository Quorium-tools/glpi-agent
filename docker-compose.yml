services:
  glpi-ticket-agent:
    container_name: glpi-agent-ticket
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file:
      - .env
    environment:
      GLPI_AGENT_TYPE: admin
      GLPI_AGENT_HOST: 0.0.0.0
      GLPI_AGENT_PORT: 8004
      GLPI_AGENT_DEV_SUBPROCESS: "true"
    volumes:
      - ./glpi_agent:/app/glpi_agent
    networks:
      - quorium-network

  glpi-knowledge-agent:
    container_name: glpi-agent-knowledge
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file:
      - .env
    environment:
      GLPI_AGENT_TYPE: knowledge-base
      GLPI_AGENT_HOST: 0.0.0.0
      GLPI_AGENT_PORT: 8005
      GLPI_AGENT_DEV_SUBPROCESS: "true"
    volumes:
      - ./glpi_agent:/app/glpi_agent
    networks:
      - quorium-network

  glpi-agent-frontend:
    container_name: glpi-agent-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      BACKEND_URL: http://glpi-ticket-agent:8004
      BACKEND_KB_URL: http://glpi-knowledge-agent:8005
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    command: npm run dev -- --hostname 0.0.0.0 --port 3005
    volumes:
      - ./frontend:/app
      - glpi-agent-frontend-node-modules:/app/node_modules
      - glpi-agent-frontend-next:/app/.next
    depends_on:
      - glpi-ticket-agent
      - glpi-knowledge-agent
    networks:
      - quorium-network

volumes:
  glpi-agent-frontend-node-modules:
    name: glpi-agent-frontend-node-modules
    driver: local
  glpi-agent-frontend-next:
    name: glpi-agent-frontend-next
    driver: local

networks:
  quorium-network:
    external: true
